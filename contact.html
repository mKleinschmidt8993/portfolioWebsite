<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="topGrid">
      <header class="mkHeader">
        <div class="mkHA">
          <a href="index.html"
            ><img src="images/MK-logo.png" alt="Back Button"
          /></a>
        </div>
        <div class="mkHB">
          <h1>MARY KLEINSCHMIDT</h1>
        </div>
        <div class="mkHC">
          <a href="menu.html"><img src="icons/plus.png" alt="Menu" /></a>
          <ul>
            <li><a href="about.html" alt="About page">About</a></li>
            <li><a href="portfolio.html" alt="Portfolio page">Portfolio</a></li>
            <li><a href="resume.html" alt="Resume page">Resume</a></li>
            <li><a href="contact.html" alt="Contact page">Contact</a></li>
          </ul>
        </div>
      </header>
      <div class="mkGrid">
        <div class="contactBackground">
          <img src="images/contactHeartString.png" alt="Hearts" />
        </div>
        <div class="mkTop">
          <div class="contactContainer">
            <form action="" class="contact">
              <div class="contactTitle">
                <h2>Leave a Message!</h2>
              </div>
              <input
                class="contactInputs"
                type="text"
                name="name"
                placeholder="Your Name"
                required
              />
              <input
                class="contactInputs"
                type="text"
                name="email"
                placeholder="Your Email"
                required
              />
              <input
                class="contactInputs"
                type="text"
                name="message"
                placeholder="Your Message"
                required
              />
              <button type="submit">
                Submit <img src="icons/arrow.svg" alt="Arrow" />
              </button>
            </form>
          </div>
        </div>
        <div class="mkNew">
          <div class="contactMe">
            <img src="icons/email2.png" alt="Email symbol" />
            <div class="contactInfo">
              <h4>Gmail Account</h4>
              <p><em>kleinschmidt.maryrose@gmail.com</em></p>
            </div>
          </div>
          <div class="contactMe">
            <img src="icons/pound.png" alt="Pound symbol" />
            <div class="contactInfo">
              <h4>Phone Number</h4>
              <p><em>+1 (724) 575-2626</em></p>
            </div>
          </div>
          <div class="contactMe">
            <img src="icons/insta.png" alt="Instagram symbol" />
            <div class="contactInfo">
              <h4>Instagram Account</h4>
              <p><em>@insertusername.here</em></p>
            </div>
          </div>
        </div>
        <div class="footer">
          <img
            id="copyright"
            width="120px"
            height="auto"
            src="icons/copyright.png"
            alt="Copyright 2024"
          />
          <div class="icons">
            <img src="icons/phoneNumber.png" alt="Phone Number" />
            <img src="icons/email.png" alt="Email" />
            <img src="icons/instagram.png" alt="Instagram" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
