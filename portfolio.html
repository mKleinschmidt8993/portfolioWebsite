<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="topGrid">
      <header class="mkHeader">
        <div class="mkHA">
          <a href="index.html"
            ><img src="images/MK-logo.png" alt="Back Button"
          /></a>
        </div>
        <div class="mkHB">
          <h1>MARY KLEINSCHMIDT</h1>
        </div>
        <div class="mkHC">
          <a href="menu.html"><img src="icons/plus.png" alt="Menu" /></a>
          <ul>
            <li><a href="about.html" alt="About page">About</a></li>
            <li><a href="portfolio.html" alt="Portfolio page">Portfolio</a></li>
            <li><a href="resume.html" alt="Resume page">Resume</a></li>
            <li><a href="contact.html" alt="Contact page">Contact</a></li>
          </ul>
        </div>
      </header>
      <div class="mkGrid">
        <div class="portfolioBackground">
          <img src="images/portfolioBackground.png" alt="Hearts" />
        </div>
        <div class="mkTop">
          <ul class="pCard">
            <li class="pImg">
              <img
                class="pContent"
                src="images/expType.png"
                alt="Experimental type quote from Paul Rand"
              />
            </li>
            <li class="pImg">
              <img
                class="pContent"
                src="images/gd-FinalProject.jpg"
                alt="Woman with her face covered in lines and text"
              />
            </li>
            <li class="pImg">
              <video
                width="60%"
                height="auto"
                controls="controls"
                class="pContent"
              >
                <source
                  src="videos/09Rotoscope.mp4"
                  type="video/mp4"
                  alt="Animation of someone running then sliding down a hallway"
                />
              </video>
            </li>
            <li class="pImg">
              <img
                class="pContent"
                src="images/prevWeb.png"
                alt="Website mockup for a store that sells tea and coffee"
              />
            </li>
            <li class="pImg">
              <video
                class="pContent"
                width="100%"
                height="auto"
                controls="controls"
              >
                <source
                  src="videos/Clown.mp4"
                  type="video/mp4"
                  alt="Clown balancing on a ball"
                />
              </video>
            </li>
          </ul>
        </div>
        <div class="mkNew"></div>
        <div class="footer">
          <img
            id="copyright"
            width="120px"
            height="auto"
            src="icons/copyright.png"
            alt="Copyright 2024"
          />
          <div class="icons">
            <img src="icons/phoneNumber.png" alt="Phone Number" />
            <img src="icons/email.png" alt="Email" />
            <img src="icons/instagram.png" alt="Instagram" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
