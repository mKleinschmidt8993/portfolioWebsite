<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mary Kleinschmidt</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="topGrid">
      <!-- HEADER -->

      <header class="mkHeader">
        <div class="mkHA">
          <a href="index.html"
            ><img src="images/MK-logo.png" alt="Back Button"
          /></a>
        </div>
        <div class="mkHB">
          <h1>MARY KLEINSCHMIDT</h1>
        </div>
        <div class="mkHC">
          <a href="menu.html"><img src="icons/plus.png" alt="Menu" /></a>
          <ul>
            <li><a href="about.html" alt="About page">About</a></li>
            <li><a href="portfolio.html" alt="Portfolio page">Portfolio</a></li>
            <li><a href="resume.html" alt="Resume page">Resume</a></li>
            <li><a href="contact.html" alt="Contact page">Contact</a></li>
          </ul>
        </div>
      </header>

      <!-- MAIN -->

      <main class="mkGrid">
        <div class="mkBackground">
          <img src="images/heartString.png" alt="Hearts" />
        </div>
        <div class="mkTop">
          <p id="mkTopContent">
            Mary Kleinschmidt is a Graphic Designer from Western Pennsylvania
            who is interested in layout design, typography, and website design.
          </p>
          <div class="viewPortfolio">
            <a href="portfolio.html">View Portfolio</a>
            <img src="icons/arrow.svg" alt="Arrow right" />
          </div>
        </div>
        <div class="mkNew">
          <h3 class="mkNewTitle">Recent Works</h3>
          <div class="mkContent">
            <video width="100%" height="auto" controls="controls">
              <source
                src="videos/09Rotoscope.mp4"
                type="video/mp4"
                alt="Animation of someone running then sliding down a hallway"
              />
            </video>
            <img
              width="100%"
              height="auto"
              src="images/gd-FinalProject.jpg"
              alt="Woman with her face covered in lines and text"
            />
            <video width="100%" height="auto" controls="controls">
              <source
                src="videos/Clown.mp4"
                type="video/mp4"
                alt="Clown balancing on a ball"
              />
            </video>
          </div>
        </div>

        <!-- FOOTER -->

        <div class="footer">
          <img
            id="copyright"
            width="120px"
            height="auto"
            src="icons/copyright.png"
            alt="Copyright 2024"
          />
          <div class="icons">
            <img src="icons/phoneNumber.png" alt="Phone Number" />
            <img src="icons/email.png" alt="Email" />
            <img src="icons/instagram.png" alt="Instagram" />
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
